name: Acceptance Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Acceptance Tests (Base Sepolia)
        env:
          PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
          PAY_NETWORK: testnet
        run: npm run test:acceptance

# Smithery registry configuration for @pay-skill/mcp
# https://smithery.ai/server/@pay-skill/mcp

build:
  external:
    - keytar

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      PAYSKILL_SIGNER_KEY:
        type: string
        title: "Key Override (optional)"
        description: "Not needed for normal use — a wallet is auto-generated and stored in the OS keychain on first run. Set this to import an existing key (64 hex chars) or decrypt a .enc keystore."
        x-secret: true
      PAY_NETWORK:
        type: string
        title: "Network"
        description: "Target network. Use 'mainnet' for Base mainnet or 'testnet' for Base Sepolia."
        default: "mainnet"
        enum: ["mainnet", "testnet"]
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@pay-skill/mcp"],
      env: Object.fromEntries(
        Object.entries({
          PAYSKILL_SIGNER_KEY: config.PAYSKILL_SIGNER_KEY,
          PAY_NETWORK: config.PAY_NETWORK || "mainnet",
        }).filter(([, v]) => v != null)
      ),
    })
  exampleConfig:
    PAY_NETWORK: "testnet"
